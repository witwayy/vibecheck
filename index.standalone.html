function renderSidebar() {
  const navItems = [
    { page: 'landing', icon: icons.home, label: 'Home' },
    { page: 'idea', icon: icons.zap, label: 'Idea Discovery' },
    { page: 'prd', icon: icons.file, label: 'PRD Writer' },
    { page: 'zone', icon: icons.grid, label: 'Zone Map' },
  ];
  return `
    <aside class="flex w-64 flex-col border-r border-gray-200 bg-white shrink-0">
      <div class="flex h-16 items-center px-6 cursor-pointer" onclick="navigate('landing')">
        <span class="text-xl font-bold text-primary">VibeCheck</span>
      </div>
      <nav class="mt-4 flex-1 space-y-1 px-3">
        ${navItems.map(n => `
          <button onclick="navigate('${n.page}')"
            class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition-colors ${
              state.page === n.page ? 'bg-primary/10 text-primary' : 'text-gray-600 hover:bg-gray-100'
            }">
            ${n.icon} ${n.label}
          </button>
        `).join('')}
      </nav>
      <div class="border-t border-gray-200 p-4">
        <label class="mb-1 block text-xs font-medium text-gray-500">AI Model</label>
        <select onchange="setState({selectedModel: this.value})"
          class="w-full rounded-md border border-gray-300 bg-white px-3 py-1.5 text-sm">
          ${AI_MODELS.map(m => `<option value="${m.id}" ${state.selectedModel===m.id?'selected':''}>${m.label}</option>`).join('')}
        </select>
      </div>
    </aside>`;
}

function renderStepIndicator() {
  const steps = [
    { page: 'idea', label: 'Idea Discovery', step: 1 },
    { page: 'prd', label: 'PRD Writer', step: 2 },
    { page: 'zone', label: 'Zone Map', step: 3 },
  ];
  const pageOrder = { idea: 1, prd: 2, zone: 3 };
  const current = pageOrder[state.page] || 0;
  return `
    <div class="flex h-14 items-center gap-8 border-b border-gray-200 bg-white px-6">
      ${steps.map(s => {
        const isActive = s.step === current;
        const isDone = s.step < current;
        return `
          <div class="flex items-center gap-2">
            <span class="flex h-7 w-7 items-center justify-center rounded-full text-xs font-bold ${
              isActive ? 'bg-primary text-white' : isDone ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-500'
            }">${isDone ? '&#10003;' : s.step}</span>
            <span class="text-sm font-medium ${isActive ? 'text-primary' : 'text-gray-500'}">${s.label}</span>
            ${s.step < 3 ? '<span class="ml-4 h-px w-12 bg-gray-300 inline-block"></span>' : ''}
          </div>`;
      }).join('')}
    </div>`;
}

function renderChatPanel() {
  return `
    <div class="flex h-full flex-col rounded-xl border border-gray-200 bg-white">
      <div class="flex-1 space-y-4 overflow-y-auto p-4" id="chatMessages">
        ${state.chatHistory.length === 0 ? '<div class="flex h-full items-center justify-center text-sm text-gray-400">AI와 대화를 시작하세요</div>' : ''}
        ${state.chatHistory.map(msg => `
          <div class="flex ${msg.role==='user' ? 'justify-end' : 'justify-start'} fade-in">
            <div class="chat-bubble max-w-[75%] rounded-xl px-4 py-2.5 text-sm leading-relaxed ${
              msg.role==='user' ? 'bg-primary text-white' : 'bg-gray-100 text-gray-800'
            }"><pre>${escapeHtml(msg.content)}</pre></div>
          </div>
        `).join('')}
        ${state.chatLoading ? '<div class="flex justify-start fade-in"><div class="rounded-xl bg-gray-100 px-4 py-2.5 text-sm text-gray-500">생각 중...</div></div>' : ''}
      </div>
      <div class="border-t border-gray-200 p-3">
        <div class="flex items-end gap-2">
          <textarea id="chatInput" rows="1" placeholder="메시지를 입력하세요..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}"
            class="flex-1 resize-none rounded-lg border border-gray-300 px-3 py-2 text-sm"></textarea>
          <button onclick="sendChat()"
            class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary text-white transition hover:bg-primary-dark">
            ${icons.send}
          </button>
        </div>
      </div>
    </div>`;
}

        <h2 class="text-lg font-bold text-gray-900">Idea Discovery</h2>
        <p class="text-sm text-gray-500">방법론을 선택하고 AI와 대화하며 아이디어를 구체화하세요.</p>
        <div class="space-y-2">
          ${METHODS.map(m => `
            <button onclick="setState({ideaMethod:'${m.id}'})"
              class="w-full rounded-lg border p-3 text-left transition ${
                state.ideaMethod===m.id ? 'border-primary bg-primary/5' : 'border-gray-200 hover:border-gray-300'
              }">
              <div class="text-sm font-semibold text-gray-800">${m.label}</div>
              <div class="text-xs text-gray-500">${m.desc}</div>
            </button>
          `).join('')}
        </div>
        <div class="pt-4">
          <div class="mb-2 text-xs font-medium text-gray-400">프리셋 질문</div>
          <div class="space-y-1.5">
            ${(PRESETS[state.ideaMethod]||[]).map(q => `
              <button onclick="document.getElementById('chatInput').value='${escapeAttr(q)}';sendChat()"
                class="w-full rounded-md border border-gray-200 px-3 py-2 text-left text-xs text-gray-600 transition hover:bg-gray-50">
                ${escapeHtml(q)}
              </button>
            `).join('')}
          </div>
        </div>
        <button onclick="navigate('prd')"
          class="mt-4 w-full rounded-lg bg-primary py-2.5 text-sm font-semibold text-white transition hover:bg-primary-dark">
          PRD Writer로 이동 &rarr;
        </button>
      </div>
      <div class="flex-1 min-h-0">${renderChatPanel()}</div>
    </div>`;
}

function renderPRDPage() {
  const ch = CHAPTERS.find(c => c.id === state.activeChapter);
  const presets = PRD_PRESETS[state.activeChapter] || [];

  let content;
  if (state.showPreview) {
    content = renderPRDPreview();
  } else {
    content = `
      <div class="space-y-6 fade-in">
        <div class="flex items-center gap-3">
          <span class="h-4 w-4 rounded-full ${ch.color}"></span>
          <h3 class="text-xl font-bold text-gray-900">${ch.label}</h3>
        </div>
        <div class="grid gap-4 lg:grid-cols-2">
          ${ch.fields.map(f => `
            <div class="space-y-1.5">
              <div class="flex items-center justify-between">
                <label class="text-sm font-medium text-gray-700">${f.label}</label>
                <button class="flex items-center gap-1 text-xs text-primary hover:underline">${icons.chat} AI 피드백</button>
              </div>
              <textarea rows="4" placeholder="${f.label}을(를) 작성하세요..."
                oninput="state.prdData['${ch.id}']['${f.key}']=this.value"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm">${escapeHtml(state.prdData[ch.id][f.key])}</textarea>
            </div>
          `).join('')}
        </div>
        <div>
          <div class="mb-2 text-xs font-medium text-gray-400">AI 프리셋 질문</div>
          <div class="flex flex-wrap gap-2">
            ${presets.map(p => `
              <button class="rounded-full border border-gray-200 px-3 py-1.5 text-xs text-gray-600 transition hover:border-primary hover:text-primary">${p}</button>
            `).join('')}
          </div>
        </div>
      </div>`;
  }

  return `
    <div class="flex h-full gap-6">
      <div class="w-56 shrink-0 space-y-3 overflow-y-auto">
        <h2 class="text-lg font-bold text-gray-900">PRD Writer</h2>
        <p class="text-xs text-gray-500">5W1H 프레임워크</p>
        <button onclick="alert('Idea Discovery 대화 맥락을 기반으로 AI가 24개 항목을 자동 생성합니다.')"
          class="w-full rounded-lg border-2 border-dashed border-primary/40 py-2 text-sm font-medium text-primary transition hover:bg-primary/5">
          AI 자동 초안 생성
        </button>
        <div class="space-y-1.5">
          ${CHAPTERS.map(c => {
            const filled = Object.values(state.prdData[c.id]).filter(Boolean).length;
            return `
              <button onclick="setState({activeChapter:'${c.id}', showPreview:false})"
                class="flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-left transition ${
                  state.activeChapter===c.id && !state.showPreview ? 'bg-gray-100 font-semibold text-gray-900' : 'text-gray-600 hover:bg-gray-50'
                }">
                <span class="h-3 w-3 rounded-full ${c.color}"></span>
                <span class="flex-1 text-sm">${c.label}</span>
                <span class="text-xs text-gray-400">${filled}/4</span>
              </button>`;
          }).join('')}
        </div>
        <div class="space-y-2 pt-4">
          <button onclick="setState({showPreview:!state.showPreview})"
            class="w-full rounded-lg border border-gray-300 py-2 text-sm font-medium text-gray-700 transition hover:bg-gray-50">
            ${state.showPreview ? '편집 모드' : 'PRD 미리보기'}
          </button>
          <button onclick="navigate('zone')"
            class="w-full rounded-lg bg-primary py-2.5 text-sm font-semibold text-white transition hover:bg-primary-dark">
            Zone Map으로 이동 &rarr;
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto">${content}</div>
    </div>`;
}

function renderPRDPreview() {
  return `
    <div class="space-y-6 fade-in">
      <div class="flex items-center justify-between">
        <h3 class="text-lg font-bold text-gray-900">PRD 미리보기</h3>
        <button onclick="copyPRDMarkdown()"
          class="flex items-center gap-1.5 rounded-lg border border-gray-300 px-3 py-1.5 text-sm text-gray-700 transition hover:bg-gray-50">
          ${icons.copy} 마크다운 복사
        </button>
      </div>
      ${CHAPTERS.map(ch => `
        <div class="rounded-lg border border-gray-200 p-4">
          <div class="mb-3 flex items-center gap-2">
            <span class="h-3 w-3 rounded-full ${ch.color}"></span>
            <h4 class="font-bold text-gray-800">${ch.label}</h4>
          </div>
          <div class="grid gap-3 sm:grid-cols-2">
            ${ch.fields.map(f => {
              const val = state.prdData[ch.id][f.key];
              return `
                <div>
                  <div class="text-xs font-medium text-gray-400">${FIELD_LABELS[f.key]}</div>
                  <div class="mt-0.5 text-sm text-gray-700 whitespace-pre-wrap">${val ? escapeHtml(val) : '<span class="text-gray-300">(미작성)</span>'}</div>
                </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
    </div>`;
}

function renderZonePage() {
  if (state.zones.length === 0) {
    state.zones = DEFAULT_ZONES.map(z => ({ ...z, detail: '', status: 'todo' }));
  }
  const rows = [0,1,2,3,4];
  const rowLabels = ['Foundation', 'Design', 'Build', 'Integrate', 'Deliver'];

  return `
    <div class="h-full space-y-4">
      <div class="flex items-center justify-between">
        <div>
          <h2 class="text-lg font-bold text-gray-900">Zone Map</h2>
          <p class="text-sm text-gray-500">좌(선행) &rarr; 우(후속) 의존성 흐름</p>
        </div>
        <div class="flex gap-2">
          <button class="rounded-lg border border-primary px-4 py-2 text-sm font-medium text-primary transition hover:bg-primary/5">
            PRD에서 자동 생성
          </button>
          <button class="rounded-lg bg-gray-800 px-4 py-2 text-sm font-medium text-white transition hover:bg-gray-700">
            작업 목록 내보내기
          </button>
        </div>
      </div>
      <div class="overflow-auto rounded-xl border border-gray-200 bg-white p-6">
        ${rows.map(r => `
          <div class="mb-2">
            <div class="mb-1 text-[10px] font-bold uppercase tracking-wider text-gray-300">${rowLabels[r]}</div>
            <div class="grid grid-cols-4 gap-3">
              ${state.zones.filter(z => z.row === r).map(z => `
                <button onclick="openZoneModal(${z.id})"
                  class="rounded-lg border border-l-4 p-3 text-left transition hover:shadow-md ${CATEGORY_COLORS[z.category] || 'border-l-gray-400 bg-gray-50'}">
                  <div class="flex items-center justify-between">
                    <span class="text-xs font-bold text-gray-400">#${z.id}</span>
                    <span class="rounded bg-white/80 px-1.5 py-0.5 text-[10px] font-medium text-gray-500">${z.category}</span>
                  </div>
                  <div class="mt-1.5 text-sm font-semibold text-gray-800">${z.name}</div>
                  ${z.deps.length > 0 ? `<div class="mt-2 text-[10px] text-gray-400">의존: ${z.deps.map(d=>'#'+d).join(', ')}</div>` : ''}
                </button>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
    ${state.selectedZone ? renderZoneModal() : ''}`;
}

function renderZoneModal() {
  const z = state.selectedZone;
  return `
    <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40" onclick="if(event.target===this)closeZoneModal()">
      <div class="w-full max-w-2xl rounded-2xl bg-white p-6 shadow-2xl fade-in">
        <div class="mb-4 flex items-center justify-between">
          <div>
            <span class="text-xs font-bold text-gray-400">Zone #${z.id} &middot; ${z.category}</span>
            <h3 class="text-lg font-bold text-gray-900">${z.name}</h3>
          </div>
          <button onclick="closeZoneModal()" class="rounded-lg p-1.5 text-gray-400 transition hover:bg-gray-100">${icons.x}</button>
        </div>
        <div class="mb-4 flex gap-2">
          ${ZONE_ACTIONS.map(a => `
            <button onclick="setState({zoneActiveAction:'${a.id}'})"
              class="rounded-lg border px-3 py-1.5 text-xs font-medium transition ${
                state.zoneActiveAction===a.id ? 'border-primary bg-primary/10 text-primary' : 'border-gray-200 text-gray-600 hover:border-gray-300'
              }">${a.label}</button>
          `).join('')}
        </div>
        ${state.zoneActiveAction ? `
          <div class="mb-4 rounded-lg bg-gray-50 p-3 text-sm text-gray-500">
            ${ZONE_ACTIONS.find(a=>a.id===state.zoneActiveAction)?.desc || ''}
          </div>` : ''}
        <textarea id="zoneDetailInput" rows="6" placeholder="Zone 상세 내용을 작성하세요..."
          class="mb-4 w-full rounded-lg border border-gray-300 px-3 py-2 text-sm">${escapeHtml(z.detail||'')}</textarea>
        ${z.deps.length > 0 ? `<div class="mb-4 text-xs text-gray-400">선행 Zone: ${z.deps.map(d=>'#'+d).join(', ')}</div>` : ''}
        <div class="flex justify-end gap-2">
          <button onclick="closeZoneModal()" class="rounded-lg border border-gray-300 px-4 py-2 text-sm text-gray-700 transition hover:bg-gray-50">취소</button>
          <button onclick="saveZoneDetail()" class="rounded-lg bg-primary px-4 py-2 text-sm font-medium text-white transition hover:bg-primary-dark">저장</button>
        </div>
      </div>
    </div>`;
}

// ===================== ACTIONS =====================

function sendChat() {
  const input = document.getElementById('chatInput');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;
  state.chatHistory.push({ role: 'user', content: text });
  state.chatLoading = true;
  render();
  // Simulate AI response
  setTimeout(() => {
    const method = METHODS.find(m => m.id === state.ideaMethod);
    state.chatHistory.push({
      role: 'assistant',
      content: `[${state.selectedModel}] "${text}"에 대한 분석입니다.\n\n${method ? method.label + ' 방법론' : 'AI'}을 기반으로 분석하면:\n\n1. 이 아이디어는 실제 업무 현장의 Pain Point를 정확히 짚고 있습니다.\n2. 구체화를 위해 타겟 사용자의 일일 업무 플로우를 더 깊이 파악해보면 좋겠습니다.\n3. 유사 솔루션 대비 차별점을 "AI 자동화" 관점에서 정리해보세요.\n\n더 구체적인 방향을 잡아볼까요?`
    });
    state.chatLoading = false;
    render();
    const msgs = document.getElementById('chatMessages');
    if (msgs) msgs.scrollTop = msgs.scrollHeight;
  }, 1200);
}

function openZoneModal(id) {
  state.selectedZone = state.zones.find(z => z.id === id);
  state.zoneDetail = state.selectedZone?.detail || '';
  state.zoneActiveAction = null;
  render();
}

function closeZoneModal() {
  state.selectedZone = null;
  state.zoneActiveAction = null;
  render();
}

function saveZoneDetail() {
  const input = document.getElementById('zoneDetailInput');
  if (input && state.selectedZone) {
    const idx = state.zones.findIndex(z => z.id === state.selectedZone.id);
    if (idx >= 0) state.zones[idx].detail = input.value;
  }
  closeZoneModal();
}

function copyPRDMarkdown() {
  let md = '# PRD (Product Requirements Document)\n\n';
  for (const ch of CHAPTERS) {
    md += `## ${ch.label}\n\n`;
    for (const f of ch.fields) {
      const val = state.prdData[ch.id][f.key];
      md += `### ${f.label}\n${val || '(미작성)'}\n\n`;
    }
  }
  navigator.clipboard.writeText(md).then(() => alert('마크다운이 클립보드에 복사되었습니다.'));
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return String(str).replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

// ===================== MAIN RENDER =====================

function render() {
  const app = document.getElementById('app');
  if (state.page === 'landing') {
    app.innerHTML = renderLanding();
    return;
  }

  let pageContent;
  if (state.page === 'idea') pageContent = renderIdeaPage();
  else if (state.page === 'prd') pageContent = renderPRDPage();
  else if (state.page === 'zone') pageContent = renderZonePage();

  app.innerHTML = `
    <div class="flex h-screen">
      ${renderSidebar()}
      <div class="flex flex-1 flex-col overflow-hidden">
        ${renderStepIndicator()}
        <main class="flex-1 overflow-y-auto bg-gray-50 p-6">
          ${pageContent}
        </main>
      </div>
    </div>`;
}

// Initial render
render();
</script>
</body>
</html>
